{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Pending Approval</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: url("{% static 'profile.webp' %}") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            background-color: #faefef;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            
            width: 100%;
            
        }
        h2 {
            margin-bottom: 20px;
            color: #333;
        }
        p {
            margin-bottom: 20px;
            color: #666;
        }
        .form-control {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
        }
        input[type="file"] {
            padding: 5px;
        }
        button {
            padding: 10px 20px;
            background-color: #28a745;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Your account is pending approval</h2>
        <p>Please upload your certificate for approval.</p>
        <form method="post" enctype="multipart/form-data" id="upload-certificate-form">
            {% csrf_token %}
            <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
            <div class="form-group">
                <label for="certificate">Certificate (PDF only):</label>
                <input type="file" id="certificate" name="certificate" accept="application/pdf" required>
            </div>
            <button type="submit">Upload</button>
        </form>
    </div>
    <script>
        document.getElementById('upload-certificate-form').addEventListener('submit', function(event) {
            event.preventDefault();
    
            var formData = new FormData(this);
    
            fetch('{% url "upload_certificate" %}', {
                method: 'POST',
                body: formData,
                headers: {
                    'X-CSRFToken': '{{ csrf_token }}'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    Swal.fire('Success', data.message, 'success')
                        .then(() => {
                            window.location.href = '{% url "userlogin" %}';
                        });
                } else {
                    Swal.fire('Error', data.error, 'error');
                }
            })
            .catch(error => {
                Swal.fire('Error', 'An error occurred', 'error');
            });
        });
    </script>
</body>
</html>
